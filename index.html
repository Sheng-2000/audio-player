<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马可福音 - 圣经学习</title>
<style>
/* 基础样式 */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #8b5a2b; /* 温暖的棕褐色 */
  --primary-dark: #6b4423;
  --accent: #c9a66b; /* 金色点缀 */
  --bg: #faf8f5; /* 温暖的米色背景 */
  --card: #ffffff;
  --text: #333333;
  --text-muted: #777777;
  --border: #e8e0d6;
}

body { 
  font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", "Microsoft YaHei", serif; 
  background: var(--bg); 
  color: var(--text); 
  padding: 20px; 
  max-width: 900px; 
  margin: 0 auto; 
  line-height: 1.8;
}

/* 顶部标题区域 */
.header {
  text-align: center;
  padding: 40px 20px 28px;
  background: linear-gradient(135deg, #8b5a2b 0%, #a67c52 100%);
  color: white;
  margin: -20px -20px 40px;
  border-radius: 0 0 40px 40px;
  box-shadow: 0 8px 30px rgba(139, 90, 43, 0.25);
}

.header h1 {
  font-size: 38px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 4px;
}

.header .verse {
  font-size: 16px;
  opacity: 0.95;
  font-style: italic;
  margin-top: 8px;
}

.header .subtitle {
  font-size: 14px;
  opacity: 0.85;
  margin-top: 8px;
}

/* 加载状态 */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
  font-size: 18px;
}

/* 播放列表 */
.playlist {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 80px;
}

.item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 2px 8px rgba(139, 90, 43, 0.08);
}

.item:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(139, 90, 43, 0.15);
  border-color: var(--accent);
}

.item.active {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.15);
  background: linear-gradient(135deg, #fff 0%, #faf8f5 100%);
}

.num {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e8e0d6 0%, #d4c8b8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  flex-shrink: 0;
  font-family: "Georgia", serif;
}

.item.active .num {
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  color: white;
}

.content {
  flex: 1;
}

.name {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: color 0.2s;
}

.name:hover {
  color: var(--primary);
}

.info {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

.btn-group {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  text-decoration: none;
  font-family: inherit;
  font-weight: 500;
}

.btn-play {
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  color: white;
}

.btn-play:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 12px rgba(139, 90, 43, 0.3);
}

.btn-play.playing {
  background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
}

.btn-text {
  background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
  color: white;
}

.btn-text:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
}

.btn-text.disabled {
  background: #ddd;
  cursor: default;
  color: #999;
}

.btn-dl {
  background: var(--border);
  color: var(--primary);
}

.btn-dl:hover {
  background: #d4c8b8;
}

/* 文字版弹窗 */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: var(--card);
  border-radius: 20px;
  width: 100%;
  max-width: 800px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  border: 1px solid var(--border);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #fff 0%, #faf8f5 100%);
  border-radius: 20px 20px 0 0;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-left: 12px;
}

.modal-btn {
  border: none;
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.2s;
}

.modal-close {
  background: var(--border);
  color: var(--text);
}

.modal-close:hover {
  background: #d4c8b8;
}

.modal-download {
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  color: white;
}

.modal-download:hover {
  transform: scale(1.05);
}

.modal-body {
  padding: 32px;
  overflow-y: auto;
  flex: 1;
  font-size: 16px;
  line-height: 2;
  white-space: pre-wrap;
  word-break: break-word;
  color: #444;
}

.modal-body.loading-text {
  text-align: center;
  color: var(--text-muted);
}

/* 底部播放栏 */
.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 16px 20px 30px;
  display: none;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(139, 90, 43, 0.1);
}

.player-bar.show {
  display: block;
}

.player-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.player-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-time {
  font-size: 13px;
  color: var(--text-muted);
  margin-left: 12px;
  white-space: nowrap;
  font-family: monospace;
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.progress-wrap input[type=range] {
  flex: 1;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.progress-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(139, 90, 43, 0.3);
}

.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  flex-wrap: wrap;
}

.volume-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 8px;
}

.vol-icon {
  font-size: 20px;
  cursor: pointer;
  user-select: none;
  transition: transform 0.2s;
}

.vol-icon:hover {
  transform: scale(1.2);
}

.volume-wrap input[type=range] {
  width: 100px;
  height: 5px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.volume-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  cursor: pointer;
}

.vol-label {
  font-size: 12px;
  color: var(--text-muted);
  min-width: 28px;
  text-align: center;
  font-weight: 600;
}

.ctrl-btn {
  background: var(--border);
  border: none;
  border-radius: 50%;
  width: 48px;
  height: 48px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.ctrl-btn:hover {
  background: #d4c8b8;
  transform: scale(1.1);
}

.ctrl-btn.main {
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  color: white;
  width: 64px;
  height: 64px;
  font-size: 28px;
  box-shadow: 0 4px 12px rgba(139, 90, 43, 0.3);
}

.ctrl-btn.main:hover {
  box-shadow: 0 6px 16px rgba(139, 90, 43, 0.4);
}

/* 页脚 */
.footer {
  text-align: center;
  padding: 60px 20px 140px;
  color: var(--text-muted);
  font-size: 14px;
}

.footer strong {
  color: var(--primary);
}

/* 响应式设计 */
@media (max-width: 768px) {
  .header h1 { font-size: 32px; }
  .item { padding: 16px 18px; }
  .num { width: 40px; height: 40px; font-size: 16px; }
  .name { font-size: 16px; }
  .btn { padding: 8px 12px; font-size: 13px; }
  .btn-group { gap: 8px; }
}

@media (max-width: 600px) {
  .btn-group { flex-direction: column; gap: 6px; }
  .btn { padding: 8px 14px; }
  .modal-body { padding: 20px; font-size: 15px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📖 马可福音</h1>
  <p class="verse">「神的儿子，耶稣基督福音的起头。」</p>
  <p class="subtitle">—— 马可福音 1:1</p>
</div>

<div class="loading" id="loading">加载中...</div>
<div class="playlist" id="playlist"></div>

<!-- 文字版弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-actions">
        <a class="modal-btn modal-download" id="modalDl" href="#" download>⬇ 下载</a>
        <button class="modal-btn modal-close" onclick="closeModal()">✕ 关闭</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-info">
    <div class="player-title" id="playerTitle"></div>
    <div class="player-time" id="playerTime">0:00 / 0:00</div>
  </div>
  <div class="progress-wrap">
    <input type="range" id="progress" min="0" max="100" value="0">
  </div>
  <div class="player-controls">
    <button class="ctrl-btn" onclick="playPrev()" title="上一首">⏮</button>
    <button class="ctrl-btn main" id="playPauseBtn" onclick="togglePlay()" title="播放/暂停">▶</button>
    <button class="ctrl-btn" onclick="playNext()" title="下一首">⏭</button>
    <div class="volume-wrap">
      <span class="vol-icon" onclick="toggleMute()" id="volIcon">🔊</span>
      <input type="range" id="volume" min="0" max="300" value="200" title="音量">
      <span class="vol-label" id="volLabel">2x</span>
    </div>
  </div>
</div>

<div class="footer">
  共 <strong id="total">0</strong> 个音频 · 愿神的话语成为你脚前的灯，路上的光
</div>

<script>
let files = [];
let transcripts = {};
let current = -1;
let isPlaying = false;
const playlist = document.getElementById('playlist');
const audio = new Audio();
const playerBar = document.getElementById('playerBar');
const playerTitle = document.getElementById('playerTitle');
const playerTime = document.getElementById('playerTime');
const progress = document.getElementById('progress');
const playPauseBtn = document.getElementById('playPauseBtn');
const loading = document.getElementById('loading');
const BASE = 'https://raw.githubusercontent.com/Sheng-2000/audio-player/main/';

// Web Audio API 音量放大
let audioCtx, gainNode, audioSource;
let currentGain = 2.0; // 默认2倍音量
let isMuted = false;

function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = currentGain;
  audioSource = audioCtx.createMediaElementSource(audio);
  audioSource.connect(gainNode);
  gainNode.connect(audioCtx.destination);
}

function setGain(val) {
  currentGain = val;
  if (gainNode) gainNode.gain.value = isMuted ? 0 : val;
  const label = document.getElementById('volLabel');
  const icon = document.getElementById('volIcon');
  if (val === 0) { label.textContent = '静音'; icon.textContent = '🔇'; }
  else if (val < 1) { label.textContent = val.toFixed(1) + 'x'; icon.textContent = '🔈'; }
  else { label.textContent = val.toFixed(1) + 'x'; icon.textContent = isMuted ? '🔇' : '🔊'; }
}

function toggleMute() {
  isMuted = !isMuted;
  if (gainNode) gainNode.gain.value = isMuted ? 0 : currentGain;
  document.getElementById('volIcon').textContent = isMuted ? '🔇' : '🔊';
}

document.getElementById('volume').addEventListener('input', function() {
  isMuted = false;
  setGain(this.value / 100);
});

async function loadFiles() {
  try {
    const res = await fetch('https://api.github.com/repos/Sheng-2000/audio-player/contents/');
    const data = await res.json();
    files = data
      .filter(f => f.name.endsWith('.m4a') || f.name.endsWith('.M4A'))
      .map(f => ({ name: f.name.replace(/\.m4a$/i, ''), file: f.name, size: f.size }))
      .sort((a, b) => a.name.localeCompare(b.name, 'zh'));
    // 检查哪些有文字版
    const transcriptDir = data.find(f => f.name === 'transcripts' && f.type === 'dir');
    if (transcriptDir) {
      const tRes = await fetch('https://api.github.com/repos/Sheng-2000/audio-player/contents/transcripts');
      const tData = await tRes.json();
      tData.forEach(f => {
        if (f.name.endsWith('.txt')) {
          transcripts[f.name.replace(/\.txt$/, '')] = true;
        }
      });
    }
    render();
  } catch (e) {
    loading.textContent = '加载失败，请刷新重试';
    console.error(e);
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function render() {
  loading.style.display = 'none';
  document.getElementById('total').textContent = files.length;
  playlist.innerHTML = '';
  files.forEach((f, i) => {
    const hasText = !!transcripts[f.name];
    const div = document.createElement('div');
    div.className = 'item';
    div.id = 'item-' + i;
    div.innerHTML = `
      <div class="num">${i+1}</div>
      <div class="content">
        <div class="name" onclick="play(${i})">${f.name}</div>
        <div class="info">${formatSize(f.size)} · ${hasText ? '✓ 配有文字稿' : '文字稿生成中...'}</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-play" id="pbtn-${i}" onclick="play(${i})">▶ 播放</button>
        <button class="btn btn-text ${hasText ? '' : 'disabled'}" onclick="${hasText ? `showText(${i})` : 'void(0)'}" title="${hasText ? '查看文字版' : '文字稿生成中...'}">📄 文字版</button>
        <a class="btn btn-dl" href="${f.file}" download>⬇ 下载</a>
      </div>`;
    playlist.appendChild(div);
  });
}

function showText(idx) {
  const f = files[idx];
  if (!transcripts[f.name]) return;
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  const dl = document.getElementById('modalDl');
  title.textContent = f.name;
  body.textContent = '加载中...';
  body.className = 'modal-body loading-text';
  dl.href = 'transcripts/' + encodeURIComponent(f.name) + '.txt';
  dl.download = f.name + '.txt';
  overlay.classList.add('show');
  fetch(BASE + 'transcripts/' + encodeURIComponent(f.name) + '.txt')
    .then(r => r.text())
    .then(text => {
      body.textContent = text;
      body.className = 'modal-body';
    })
    .catch(() => {
      body.textContent = '加载失败';
    });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function formatTime(s) { if(isNaN(s)) return '0:00'; const m=Math.floor(s/60); return m+':'+(Math.floor(s%60)+'').padStart(2,'0'); }

function play(idx) {
  if (idx < 0 || idx >= files.length) return;
  initAudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  current = idx;
  audio.src = files[idx].file;
  playerTitle.textContent = files[idx].name;
  playerBar.classList.add('show');
  audio.play();
  isPlaying = true;
  updateUI();
}

function togglePlay() {
  if (current < 0) { play(0); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; } else { audio.play(); isPlaying = true; }
  updateUI();
}

function updateUI() {
  playPauseBtn.textContent = isPlaying ? '⏸' : '▶';
  document.querySelectorAll('.item').forEach((el, i) => {
    el.classList.toggle('active', i === current);
    const btn = document.getElementById('pbtn-' + i);
    if (btn) {
      btn.textContent = (i === current && isPlaying) ? '⏸ 暂停' : '▶ 播放';
      btn.classList.toggle('playing', i === current && isPlaying);
    }
  });
}

function playNext() { play(current + 1); }
function playPrev() { play(current - 1); }

audio.addEventListener('ended', () => { isPlaying = false; updateUI(); if (current < files.length - 1) playNext(); });
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    progress.value = (audio.currentTime / audio.duration) * 100;
    playerTime.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
  }
});
audio.addEventListener('play', () => { isPlaying = true; updateUI(); });
audio.addEventListener('pause', () => { isPlaying = false; updateUI(); });
progress.addEventListener('input', () => { if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration; });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

loadFiles();
</script>
</body>
</html>
